name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      rebuild-cache:
        description: 'Force rebuild all Maven caches (does not run a release)'
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      latest: ${{ steps.get-versions.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - id: get-versions
        run: |
          VERSIONS=$(ls -1 okapi-releases | sort -V | jq -R -s -c 'split("\n") | map(select(length > 0))')
          LATEST=$(ls -1 okapi-releases | sort -V | tail -1)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  cache-deps:
    if: github.event_name == 'workflow_dispatch'
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync per-version POM parent version
        run: |
          PARENT_VERSION=$(sed -n '/<artifactId>okapi-bridge-parent<\/artifactId>/{n;s/.*<version>\(.*\)<\/version>.*/\1/p;}' pom.xml)
          for pom in okapi-releases/*/pom.xml; do
            sed -i "/<parent>/,/<\/parent>/s|<version>[^<]*</version>|<version>${PARENT_VERSION}</version>|" "$pom"
          done

      - name: Delete Maven cache for rebuild
        if: inputs.rebuild-cache == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in $(gh cache list --key "maven-okapi-${{ matrix.okapi-version }}-" --json id -q '.[].id'); do
            gh cache delete "$id" || true
          done

      - name: Compute dependency hash (ignoring version bumps)
        id: dep-hash
        run: |
          HASH=$(cat pom.xml okapi-releases/${{ matrix.okapi-version }}/pom.xml \
            | grep -v '<version>' | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Maven repository (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ steps.dep-hash.outputs.hash }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Resolve dependencies
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Verify resolved JARs are valid
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: |
          CORRUPT=0
          while IFS= read -r -d '' jar; do
            if ! jar tf "$jar" > /dev/null 2>&1; then
              echo "::error::Corrupt JAR after resolution: $jar"
              CORRUPT=$((CORRUPT + 1))
            fi
          done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          if [ "$CORRUPT" -gt 0 ]; then
            echo "::error::$CORRUPT corrupt JAR(s) after dependency resolution — aborting to prevent caching bad artifacts"
            exit 1
          fi

  build:
    if: github.event_name == 'push'
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync per-version POM parent version
        run: |
          PARENT_VERSION=$(sed -n '/<artifactId>okapi-bridge-parent<\/artifactId>/{n;s/.*<version>\(.*\)<\/version>.*/\1/p;}' pom.xml)
          for pom in okapi-releases/*/pom.xml; do
            sed -i "/<parent>/,/<\/parent>/s|<version>[^<]*</version>|<version>${PARENT_VERSION}</version>|" "$pom"
          done

      - name: Compute dependency hash (ignoring version bumps)
        id: dep-hash
        run: |
          HASH=$(cat pom.xml okapi-releases/${{ matrix.okapi-version }}/pom.xml \
            | grep -v '<version>' | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Maven repository (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ steps.dep-hash.outputs.hash }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Resolve dependencies (cache miss)
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Build with Okapi ${{ matrix.okapi-version }}
        run: mvn -B package -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Package release archive
        env:
          TAG: ${{ github.ref_name }}
          OKAPI_VERSION: ${{ matrix.okapi-version }}
        run: ./scripts/package-release.sh "${TAG#v}" "$OKAPI_VERSION"

      - name: Extract capabilities JSON for registry
        if: matrix.okapi-version == needs.setup.outputs.latest
        run: jq '.capabilities' staging/manifest.json > capabilities.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: okapi-bridge-${{ matrix.okapi-version }}
          path: |
            okapi-bridge-*.tar.gz
            okapi-bridge-*.tar.gz.sha256
            capabilities.json

  release:
    needs: build
    if: always() && !cancelled() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/okapi-bridge-*.tar.gz
            artifacts/okapi-bridge-*.tar.gz.sha256
          generate_release_notes: true

  publish-testdata:
    name: Trigger Okapi Test Data
    needs: [setup, release]
    if: always() && !cancelled() && needs.release.result == 'success'
    uses: ./.github/workflows/okapi-testdata.yml
    with:
      okapi_version: ${{ needs.setup.outputs.latest }}
    secrets: inherit

  update-registry:
    needs: [setup, release]
    if: always() && !cancelled() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          repository: neokapi/registry
          token: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
          path: registry

      - name: Update plugins.json
        env:
          TAG: ${{ github.ref_name }}
          OKAPI_LATEST: ${{ needs.setup.outputs.latest }}
        run: ./scripts/update-registry.sh "$TAG" registry artifacts "$OKAPI_LATEST"

      - name: Commit and push registry update
        run: |
          cd registry
          git config user.name "neokapi-bot"
          git config user.email "bot@neokapi.dev"
          git add plugins.json
          git commit -m "Update okapi to ${GITHUB_REF_NAME}"
          git push
