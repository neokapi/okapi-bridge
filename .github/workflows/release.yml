name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      rebuild-cache:
        description: 'Force rebuild all Maven caches (does not run a release)'
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      latest: ${{ steps.get-versions.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - id: get-versions
        run: |
          VERSIONS=$(ls -1 okapi-releases | sort -V | jq -R -s -c 'split("\n") | map(select(length > 0))')
          LATEST=$(ls -1 okapi-releases | sort -V | tail -1)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  cache-deps:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Delete Maven cache for rebuild
        if: inputs.rebuild-cache == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in $(gh cache list --key "maven-okapi-${{ matrix.okapi-version }}-" --json id -q '.[].id'); do
            gh cache delete "$id" || true
          done

      - name: Cache Maven repository (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ hashFiles('pom.xml', format('okapi-releases/{0}/pom.xml', matrix.okapi-version)) }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Validate cached Okapi JARs
        id: validate-cache
        run: |
          CORRUPT=0
          if [ -d ~/.m2/repository/net/sf/okapi ]; then
            while IFS= read -r -d '' jar; do
              if ! jar tf "$jar" > /dev/null 2>&1; then
                echo "::warning::Corrupt JAR detected, removing: $jar"
                rm -f "$jar"
                CORRUPT=$((CORRUPT + 1))
              fi
            done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          fi
          echo "corrupt=$CORRUPT" >> $GITHUB_OUTPUT
          if [ "$CORRUPT" -gt 0 ]; then
            echo "Removed $CORRUPT corrupt JAR(s) from Maven cache — will re-resolve"
          fi

      - name: Resolve dependencies
        if: steps.maven-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.corrupt != '0'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Verify resolved JARs are valid
        run: |
          CORRUPT=0
          while IFS= read -r -d '' jar; do
            if ! jar tf "$jar" > /dev/null 2>&1; then
              echo "::error::Corrupt JAR after resolution: $jar"
              CORRUPT=$((CORRUPT + 1))
            fi
          done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          if [ "$CORRUPT" -gt 0 ]; then
            echo "::error::$CORRUPT corrupt JAR(s) after dependency resolution — aborting to prevent caching bad artifacts"
            exit 1
          fi

  build:
    if: github.event_name == 'push'
    needs: [setup, cache-deps]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Maven cache (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ hashFiles('pom.xml', format('okapi-releases/{0}/pom.xml', matrix.okapi-version)) }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Validate cached Okapi JARs
        id: validate-build-cache
        run: |
          CORRUPT=0
          if [ -d ~/.m2/repository/net/sf/okapi ]; then
            while IFS= read -r -d '' jar; do
              if ! jar tf "$jar" > /dev/null 2>&1; then
                echo "::warning::Corrupt JAR in build cache, removing: $jar"
                rm -f "$jar"
                CORRUPT=$((CORRUPT + 1))
              fi
            done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          fi
          echo "corrupt=$CORRUPT" >> $GITHUB_OUTPUT
          if [ "$CORRUPT" -gt 0 ]; then
            echo "Removed $CORRUPT corrupt JAR(s) — will re-resolve before build"
          fi

      - name: Re-resolve dependencies (corrupt cache)
        if: steps.validate-build-cache.outputs.corrupt != '0'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Build with Okapi ${{ matrix.okapi-version }}
        run: mvn -B package -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Package release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          OKAPI_VERSION="${{ matrix.okapi-version }}"
          ARCHIVE_NAME="okapi-bridge-${TAG}-okapi${OKAPI_VERSION}"

          mkdir -p staging/schemas
          JAR_FILE=$(ls okapi-releases/${OKAPI_VERSION}/target/gokapi-bridge-*-jar-with-dependencies.jar 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No jar-with-dependencies found in okapi-releases/${OKAPI_VERSION}/target/"
            ls -la okapi-releases/${OKAPI_VERSION}/target/
            exit 1
          fi
          cp "$JAR_FILE" staging/gokapi-bridge-jar-with-dependencies.jar

          # Generate unified manifest.json with capabilities and runtime config
          CAPABILITIES=$(java -jar "$JAR_FILE" --list-filters 2>/dev/null \
            | jq '[.filters[] | {
                type: "format",
                id: .id,
                name: .name,
                display_name: .display_name,
                mime_types: (if (.mime_types | length) > 0 then .mime_types else null end),
                extensions: (if (.extensions | length) > 0 then .extensions else null end)
              } | with_entries(select(.value != null))]')

          jq -n --arg name "okapi-bridge" \
                --arg version "$VERSION" \
                --argjson capabilities "$CAPABILITIES" \
                '{
                  name: $name,
                  version: $version,
                  plugin_type: "bundle",
                  install_type: "bridge",
                  command: "java",
                  args: ["-jar", "gokapi-bridge-jar-with-dependencies.jar"],
                  capabilities: $capabilities
                }' > staging/manifest.json

          # Include composite schemas for this Okapi version from centralized location
          # Use max version per filter to handle any duplicate entries in schemas/versions.json
          jq -r --arg ov "${OKAPI_VERSION}" '
            .filters | to_entries[] |
            .key as $f |
            [.value.versions[] | select(.okapiVersions | index($ov))] |
            max_by(.version) | select(.) |
            "\($f) \(.version)"
          ' schemas/versions.json | while read filter version; do
            cp "schemas/composite/${filter}.v${version}.schema.json" staging/schemas/
          done

          cd staging
          tar czf "../${ARCHIVE_NAME}.tar.gz" .
          cd ..

          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Extract capabilities JSON for registry
        if: matrix.okapi-version == needs.setup.outputs.latest
        run: jq '.capabilities' staging/manifest.json > capabilities.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: okapi-bridge-${{ matrix.okapi-version }}
          path: |
            okapi-bridge-*.tar.gz
            okapi-bridge-*.tar.gz.sha256
            capabilities.json

  release:
    needs: build
    if: always() && !cancelled() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/okapi-bridge-*.tar.gz
            artifacts/okapi-bridge-*.tar.gz.sha256
          generate_release_notes: true

  update-registry:
    needs: [setup, release]
    if: always() && !cancelled() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          repository: gokapi/registry
          token: ${{ secrets.GOKAPI_REGISTRY_TOKEN }}
          path: registry

      - name: Update plugins.json
        env:
          OKAPI_LATEST: ${{ needs.setup.outputs.latest }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/gokapi/okapi-bridge/releases/download/${TAG}"

          # Read capabilities generated from the bridge JAR
          CAPABILITIES=$(cat artifacts/capabilities.json)

          cd registry
          echo '{"version":1,"plugins":[]}' > plugins.json

          # Add each Okapi version as a plugin entry (derived from okapi-releases/)
          for okapi_version in $(ls -1 ../okapi-releases | sort -V); do
            CHECKSUM=$(cat ../artifacts/okapi-bridge-${TAG}-okapi${okapi_version}.tar.gz.sha256 | awk '{print $1}')
            URL="${BASE_URL}/okapi-bridge-${TAG}-okapi${okapi_version}.tar.gz"

            # Determine plugin name (latest gets "okapi-bridge", others get version suffix)
            if [ "$okapi_version" = "$OKAPI_LATEST" ]; then
              PLUGIN_NAME="okapi-bridge"
              DESCRIPTION="Okapi filters (v${okapi_version}, latest)"
            else
              PLUGIN_NAME="okapi-bridge-${okapi_version}"
              DESCRIPTION="Okapi filters (v${okapi_version})"
            fi

            jq --arg name "$PLUGIN_NAME" \
               --arg version "$VERSION" \
               --arg desc "$DESCRIPTION" \
               --arg checksum "$CHECKSUM" \
               --arg url "$URL" \
               --argjson capabilities "$CAPABILITIES" \
               '.plugins += [{
                 name: $name,
                 version: $version,
                 description: $desc,
                 plugin_type: "bundle",
                 install_type: "bridge",
                 platform: "",
                 checksum: $checksum,
                 download_url: $url,
                 min_host_version: "0.1.0",
                 capabilities: $capabilities
               }]' plugins.json > plugins.tmp && mv plugins.tmp plugins.json
          done

      - name: Commit and push registry update
        run: |
          cd registry
          git config user.name "gokapi-bot"
          git config user.email "bot@gokapi.dev"
          git add plugins.json
          git commit -m "Update okapi-bridge to ${GITHUB_REF_NAME}"
          git push
