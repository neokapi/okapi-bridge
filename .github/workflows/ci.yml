name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild-cache:
        description: 'Force rebuild Maven cache'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.get-latest.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - id: get-latest
        run: |
          latest=$(ls -1 okapi-releases | sort -V | tail -1)
          echo "latest=$latest" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Delete Maven cache for rebuild
        if: inputs.rebuild-cache == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in $(gh cache list --key "maven-okapi-${{ needs.setup.outputs.latest }}-" --json id -q '.[].id'); do
            gh cache delete "$id" || true
          done

      - name: Cache Maven repository (Okapi ${{ needs.setup.outputs.latest }})
        uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ needs.setup.outputs.latest }}-${{ hashFiles('pom.xml', 'bridge-core/pom.xml', format('okapi-releases/{0}/pom.xml', needs.setup.outputs.latest)) }}
          restore-keys: maven-okapi-${{ needs.setup.outputs.latest }}-

      - name: Validate cached Okapi JARs
        id: validate-cache
        run: |
          CORRUPT=0
          if [ -d ~/.m2/repository/net/sf/okapi ]; then
            while IFS= read -r -d '' jar; do
              if ! jar tf "$jar" > /dev/null 2>&1; then
                echo "::warning::Corrupt JAR detected, removing: $jar"
                rm -f "$jar"
                CORRUPT=$((CORRUPT + 1))
              fi
            done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          fi
          echo "corrupt=$CORRUPT" >> $GITHUB_OUTPUT
          if [ "$CORRUPT" -gt 0 ]; then
            echo "Removed $CORRUPT corrupt JAR(s) from Maven cache — will re-resolve"
          fi

      - name: Resolve dependencies
        if: steps.maven-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.corrupt != '0'
        run: |
          mvn -B dependency:go-offline -f okapi-releases/${{ needs.setup.outputs.latest }}/pom.xml
          mvn -B dependency:go-offline -pl bridge-core -Dokapi.version=${{ needs.setup.outputs.latest }}

      - name: Verify resolved JARs are valid
        run: |
          CORRUPT=0
          while IFS= read -r -d '' jar; do
            if ! jar tf "$jar" > /dev/null 2>&1; then
              echo "::error::Corrupt JAR after resolution: $jar"
              CORRUPT=$((CORRUPT + 1))
            fi
          done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          if [ "$CORRUPT" -gt 0 ]; then
            echo "::error::$CORRUPT corrupt JAR(s) after dependency resolution — aborting to prevent caching bad artifacts"
            exit 1
          fi

      - name: Build with latest Okapi (${{ needs.setup.outputs.latest }})
        run: mvn -B package -f okapi-releases/${{ needs.setup.outputs.latest }}/pom.xml

      - name: Run tests (bridge-core)
        run: mvn -B test -pl bridge-core -Dokapi.version=${{ needs.setup.outputs.latest }}

  verify-schemas:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (for schema tools)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Regenerate composite schemas
        run: ./scripts/centralize-schemas.sh regenerate-composites

      - name: Update README matrix
        run: ./scripts/update-readme-matrix.sh

      - name: Verify schemas are up to date
        run: |
          # Ignore generatedAt timestamps which change on every run
          git diff --stat -- schemas/ README.md
          git diff -- schemas/ README.md | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v '"generatedAt"' > /tmp/meaningful-diff.txt || true
          if [[ -s /tmp/meaningful-diff.txt ]]; then
            echo "::error::Composite schemas or README are out of date. Run 'make version-schemas' locally and commit the results."
            cat /tmp/meaningful-diff.txt | head -40
            exit 1
          fi
          echo "✓ Schemas and README are up to date"
