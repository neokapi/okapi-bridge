name: Snapshot Build

on:
  schedule:
    - cron: '0 4 * * *'  # 4:00 UTC daily (before 6:00 UTC release check)
  workflow_dispatch:
    inputs:
      okapi_ref:
        description: 'Okapi git ref to build (branch, tag, or commit)'
        type: string
        default: 'main'

concurrency:
  group: snapshot-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout okapi-bridge
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-snapshot-${{ hashFiles('pom.xml', 'bridge-core/pom.xml') }}
          restore-keys: |
            maven-snapshot-
            maven-okapi-

      - name: Validate cached Okapi JARs
        run: |
          CORRUPT=0
          if [ -d ~/.m2/repository/net/sf/okapi ]; then
            while IFS= read -r -d '' jar; do
              if ! jar tf "$jar" > /dev/null 2>&1; then
                echo "::warning::Corrupt JAR in snapshot cache, removing: $jar"
                rm -f "$jar"
                CORRUPT=$((CORRUPT + 1))
              fi
            done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          fi
          if [ "$CORRUPT" -gt 0 ]; then
            echo "Removed $CORRUPT corrupt JAR(s) — Maven will re-download during build"
          fi

      - name: Clone Okapi
        env:
          OKAPI_REF: ${{ inputs.okapi_ref || 'main' }}
        run: git clone --depth 1 --branch "$OKAPI_REF" https://gitlab.com/okapiframework/Okapi.git okapi-source

      - name: Extract Okapi version
        id: okapi-version
        run: |
          version=$(sed -n '/<parent>/,/<\/parent>/s/.*<version>\(.*\)<\/version>.*/\1/p' okapi-source/pom.xml | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Okapi version: $version"

      - name: Build Okapi from source
        id: okapi-build
        working-directory: okapi-source
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: |
          echo "::group::Install root pom"
          mvn -B install -N -DskipTests
          echo "::endgroup::"

          echo "::group::Install superpom"
          mvn -B install -N -f superpom/pom.xml -DskipTests
          echo "::endgroup::"

          echo "::group::Build core + filters"
          # Use -fae (fail-at-end) so partial builds still install successful modules.
          # Okapi main may have broken modules — we want all working ones available.
          if mvn -B install -f okapi/pom.xml -DskipTests -T 1C -fae 2>&1 | tee /tmp/okapi-build.log; then
            echo "okapi_build_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Okapi build had failures (partial build — continuing with available modules)"
            echo "okapi_build_status=partial" >> "$GITHUB_OUTPUT"

            # Extract failed modules for the summary
            FAILED=$(grep '\[ERROR\].*FAILURE' /tmp/okapi-build.log | sed 's/.*\] //' || true)
            {
              echo 'failed_modules<<EOF'
              echo "$FAILED"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

          # Verify okapi-core was installed (required for the bridge)
          if [ ! -f "$HOME/.m2/repository/net/sf/okapi/okapi-core/$OKAPI_VERSION/okapi-core-$OKAPI_VERSION.jar" ]; then
            echo "::error::okapi-core failed to build — cannot continue"
            exit 1
          fi

      - name: Install parent pom
        run: mvn -B install -N -DskipTests

      - name: Generate SNAPSHOT pom
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: |
          SNAPSHOT_DIR=$(mktemp -d)
          echo "SNAPSHOT_DIR=$SNAPSHOT_DIR" >> "$GITHUB_ENV"
          ./scripts/generate-version-pom.sh --local --output-dir "$SNAPSHOT_DIR" "$OKAPI_VERSION"

      - name: Patch pom for partial Okapi builds
        if: steps.okapi-build.outputs.okapi_build_status == 'partial'
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: |
          # okapi-lib (the SDK uber-JAR) won't exist if any Okapi module failed.
          # Replace it with individual filter/step JARs that were actually installed.
          OKAPI_DIR="$HOME/.m2/repository/net/sf/okapi"

          DEPS=""
          for jar in "$OKAPI_DIR"/okapi-filter-*/"$OKAPI_VERSION"/*.jar \
                     "$OKAPI_DIR"/okapi-step-*/"$OKAPI_VERSION"/*.jar \
                     "$OKAPI_DIR"/okapi-lib-*/"$OKAPI_VERSION"/*.jar; do
            [ -f "$jar" ] || continue
            # Skip sources/javadoc JARs
            [[ "$jar" == *-sources.jar ]] && continue
            [[ "$jar" == *-javadoc.jar ]] && continue
            ARTIFACT=$(basename "$(dirname "$(dirname "$jar")")")
            DEPS="$DEPS        <dependency>
              <groupId>net.sf.okapi</groupId>
              <artifactId>${ARTIFACT}</artifactId>
              <version>\${okapi.version}</version>
          </dependency>
          "
          done

          INSTALLED=$(echo "$DEPS" | grep -c '<dependency>' || true)
          echo "Replacing okapi-lib with $INSTALLED individual Okapi artifacts"

          # Replace the okapi-lib dependency block with individual deps
          python3 -c "
          import re, sys
          pom = open('$SNAPSHOT_DIR/pom.xml').read()
          okapi_lib_dep = re.compile(
              r'<dependency>\s*<groupId>net\.sf\.okapi</groupId>\s*'
              r'<artifactId>okapi-lib</artifactId>.*?</dependency>',
              re.DOTALL
          )
          deps = '''$DEPS'''
          pom = okapi_lib_dep.sub(deps.strip(), pom, count=1)
          open('$SNAPSHOT_DIR/pom.xml', 'w').write(pom)
          "

      - name: Build okapi-bridge
        run: mvn -B package -f "$SNAPSHOT_DIR/pom.xml"

      - name: Run bridge-core tests
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: mvn -B test -pl bridge-core -Dokapi.version="$OKAPI_VERSION"

      - name: Smoke test
        run: |
          JAR=$(ls "$SNAPSHOT_DIR"/target/neokapi-bridge-*-jar-with-dependencies.jar)
          FILTERS=$(java -jar "$JAR" --list-filters)
          FILTER_COUNT=$(echo "$FILTERS" | wc -l | tr -d ' ')
          echo "Filters found: $FILTER_COUNT"
          echo "$FILTERS"
          if [ "$FILTER_COUNT" -lt 1 ]; then
            echo "::error::No filters found in SNAPSHOT build"
            exit 1
          fi

      - name: Build summary
        if: always()
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
          OKAPI_REF: ${{ inputs.okapi_ref || 'main' }}
          OKAPI_BUILD_STATUS: ${{ steps.okapi-build.outputs.okapi_build_status }}
          FAILED_MODULES: ${{ steps.okapi-build.outputs.failed_modules }}
        run: |
          JAR=$(ls "$SNAPSHOT_DIR"/target/neokapi-bridge-*-jar-with-dependencies.jar 2>/dev/null || echo "")
          JAR_SIZE=""
          FILTER_COUNT="N/A"
          if [ -n "$JAR" ]; then
            JAR_SIZE=$(du -h "$JAR" | cut -f1)
            FILTER_COUNT=$(java -jar "$JAR" --list-filters 2>/dev/null | wc -l | tr -d ' ' || echo "N/A")
          fi

          BUILD_ICON="✅"
          if [ "$OKAPI_BUILD_STATUS" = "partial" ]; then
            BUILD_ICON="⚠️ partial"
          elif [ "$OKAPI_BUILD_STATUS" != "success" ]; then
            BUILD_ICON="❌ failed"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## Snapshot Build Results

          | Field | Value |
          |-------|-------|
          SUMMARY
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | Okapi Version | \`${OKAPI_VERSION}\` |
          | Okapi Ref | \`${OKAPI_REF}\` |
          | Okapi Build | ${BUILD_ICON} |
          | Filter Count | ${FILTER_COUNT} |
          | JAR Size | ${JAR_SIZE} |
          EOF

          if [ -n "$FAILED_MODULES" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" << EOF

          <details><summary>Failed Okapi modules</summary>

          \`\`\`
          ${FAILED_MODULES}
          \`\`\`

          </details>
          EOF
          fi

      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: neokapi-bridge-snapshot
          path: ${{ env.SNAPSHOT_DIR }}/target/neokapi-bridge-*-jar-with-dependencies.jar
          retention-days: 7
          if-no-files-found: ignore

      - name: Package release archive
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: |
          ARCHIVE_NAME="okapi-bridge-snapshot-okapi${OKAPI_VERSION}"

          mkdir -p staging
          JAR_FILE=$(ls "$SNAPSHOT_DIR"/target/neokapi-bridge-*-jar-with-dependencies.jar 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No jar-with-dependencies found"
            exit 1
          fi
          cp "$JAR_FILE" staging/neokapi-bridge-jar-with-dependencies.jar

          # Generate manifest.json with capabilities
          CAPABILITIES=$(java -jar "$JAR_FILE" --list-filters 2>/dev/null \
            | jq '[.filters[] | {
                type: "format",
                id: .id,
                name: .name,
                display_name: .display_name,
                capabilities: .capabilities,
                mime_types: (if (.mime_types | length) > 0 then .mime_types else null end),
                extensions: (if (.extensions | length) > 0 then .extensions else null end)
              } | with_entries(select(.value != null))]')

          jq -n --arg version "snapshot-${OKAPI_VERSION}" \
                --arg framework_version "$OKAPI_VERSION" \
                --argjson capabilities "$CAPABILITIES" \
                '{
                  name: "okapi",
                  version: $version,
                  framework_version: $framework_version,
                  plugin_type: "bundle",
                  install_type: "bridge",
                  command: "java",
                  args: ["-jar", "neokapi-bridge-jar-with-dependencies.jar"],
                  capabilities: $capabilities
                }' > staging/manifest.json

          cd staging
          tar czf "../${ARCHIVE_NAME}.tar.gz" .
          cd ..

          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Create snapshot pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
          OKAPI_REF: ${{ inputs.okapi_ref || 'main' }}
        run: |
          # Delete existing snapshot release if present
          gh release delete snapshot --yes 2>/dev/null || true
          git push origin :refs/tags/snapshot 2>/dev/null || true

          gh release create snapshot \
            --prerelease \
            --title "Snapshot (Okapi ${OKAPI_VERSION})" \
            --notes "Automated snapshot build against unreleased Okapi \`${OKAPI_VERSION}\`.

          This is a pre-release for testing — not for production use.
          Built from Okapi ref: \`${OKAPI_REF}\`" \
            "${ARCHIVE_NAME}.tar.gz"

      - name: Update snapshot registry channel
        env:
          OKAPI_VERSION: ${{ steps.okapi-version.outputs.version }}
        run: |
          CHECKSUM=$(awk '{print $1}' "${ARCHIVE_NAME}.tar.gz.sha256")
          CAPABILITIES=$(jq '.capabilities' staging/manifest.json)
          DOWNLOAD_URL="https://github.com/neokapi/okapi-bridge/releases/download/snapshot/${ARCHIVE_NAME}.tar.gz"

          # Checkout registry
          git clone "https://x-access-token:${{ secrets.NEOKAPI_GITHUB_TOKEN }}@github.com/neokapi/registry.git" registry

          cd registry
          mkdir -p channels

          jq -n --arg version "snapshot-${OKAPI_VERSION}" \
                --arg desc "Okapi filters (${OKAPI_VERSION}, snapshot)" \
                --arg checksum "$CHECKSUM" \
                --arg url "$DOWNLOAD_URL" \
                --argjson capabilities "$CAPABILITIES" \
                '{
                  version: 1,
                  plugins: [{
                    name: "okapi",
                    version: $version,
                    description: $desc,
                    plugin_type: "bundle",
                    install_type: "bridge",
                    platform: "",
                    checksum: $checksum,
                    download_url: $url,
                    min_host_version: "0.1.0",
                    capabilities: $capabilities
                  }]
                }' > channels/snapshot.json

          git config user.name "neokapi-bot"
          git config user.email "bot@neokapi.dev"
          git add channels/snapshot.json
          git commit -m "Update okapi snapshot channel (Okapi ${OKAPI_VERSION})"
          git push
